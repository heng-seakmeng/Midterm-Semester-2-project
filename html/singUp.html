<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>McLaren — Sign Up</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Racing+Sans+One:regular"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../Styling/MclarenStyle.css" />
    <link rel="stylesheet" href="../Styling/signup.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <header class="navbar">
      <div class="logo">McLaren</div>
      <nav class="menu">
        <ul>
          <li>
            <a href="../index.html" class="nav-link" target="_blank">Home</a>
          </li>
          <li>
            <a href="../html/models.html" class="nav-link" target="_blank"
              >Models</a
            >
          </li>
          <li>
            <a href="../html/performance.html" class="nav-link" target="_blank"
              >Performance</a
            >
          </li>
          <li>
            <a href="../html/gallery.html" class="nav-link" target="_blank"
              >Gallery</a
            >
          </li>
          <li>
            <a href="../html/about.html" class="nav-link" target="_blank"
              >About</a
            >
          </li>
        </ul>
      </nav>
      <div class="nav-buttons">
        <a href="../html/contact.html" class="contact-btn" target="_blank"
          >Contact</a
        >
        <a href="../html/singUp.html" class="sign-up-btn" target="_blank"
          >Sign up</a
        >
      </div>
      <input type="checkbox" id="menu-toggle" class="menu-toggle" />
      <label for="menu-toggle" class="mobile-menu">☰</label>
    </header>

    <!-- SIGNUP SECTION -->
    <section class="signup-section">
      <div class="signup-visual">
        <img src="../cars/mclaren-5.jpeg" alt="McLaren P1" />
        <div class="signup-visual-overlay">
          <h2>Join the<br />McLaren Circle</h2>
          <p>
            Create an account to save your configurations, track your orders,
            and get early access to new models.
          </p>
        </div>
      </div>

      <div class="signup-form-wrap">
        <h1>Create Your Account</h1>
        <p class="signup-sub">
          Already have an account?
          <a href="#" class="signup-link">Log in</a>
        </p>

        <form class="signup-form">
          <div class="form-row">
            <div class="form-group">
              <label for="signupFirstName">First Name</label>
              <input
                type="text"
                id="signupFirstName"
                name="firstName"
                placeholder="John"
                required
              />
            </div>
            <div class="form-group">
              <label for="signupLastName">Last Name</label>
              <input
                type="text"
                id="signupLastName"
                name="lastName"
                placeholder="Doe"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="signupEmail">Email Address</label>
            <input
              type="email"
              id="signupEmail"
              name="email"
              placeholder="hengseakmeng100percent@example.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input
              type="password"
              id="signupPassword"
              name="password"
              placeholder="At least 8 characters"
              required
            />
          </div>

          <div class="form-group">
            <label for="signupConfirmPassword">Confirm Password</label>
            <input
              type="password"
              id="signupConfirmPassword"
              name="confirmPassword"
              placeholder="Re-enter your password"
              required
            />
          </div>

          <div class="form-checkbox">
            <input type="checkbox" id="terms" name="terms" required />
            <label for="terms">
              I agree to the <a href="#">Terms of Use</a> and
              <a href="#">Privacy Policy</a>
            </label>
          </div>

          <button type="submit" class="signup-submit-btn">
            Create Account
          </button>
        </form>
      </div>
    </section>

    <script src="../Script/Mclaren.js"></script>
  </body>
</html>
